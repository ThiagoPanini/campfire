<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campfire — Repertoire & Song Entry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; background: #0b0b0b; color: #fff; font-family: 'Space Grotesk', sans-serif; min-height: 100%; }
    *, *::before, *::after { box-sizing: border-box; }
    button { cursor: pointer; }
    /* Canvas-level type so headlines render correctly inside artboards */
    .cf-display, .cf-mono { font-feature-settings: "kern"; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="src/repertoire-shared.jsx"></script>
  <script type="text/babel" src="src/repertoire-icons.jsx"></script>
  <script type="text/babel" src="src/repertoire-home.jsx"></script>
  <script type="text/babel" src="src/repertoire-search.jsx"></script>
  <script type="text/babel" src="src/repertoire-detail.jsx"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    // Inject shared CSS once at canvas level so all artboards inherit it
    function CanvasStyles() {
      return <style dangerouslySetInnerHTML={{ __html: window.SHARED_CSS }} />;
    }

    function Frame({ children }) {
      // Each artboard gets a constrained canvas-internal viewport
      return (
        <div className="cf" style={{ width: "100%", height: "100%", position: "relative", overflow: "hidden" }}>
          {children}
        </div>
      );
    }

    const W = 1280;
    const H = 880;

    function App() {
      return (
        <>
          <CanvasStyles />
          <DesignCanvas
            title="CAMPFIRE — REPERTOIRE & SONG ENTRY"
            subtitle="Spec 003 · Repertoire Song Entry · designs across the full add-song flow"
          >
            <DCSection id="home" title="01 · HOME (REPERTOIRE LIST)">
              <DCArtboard id="home-empty"   label="Empty state — first run" width={W} height={H}>
                <Frame><HomeEmpty /></Frame>
              </DCArtboard>
              <DCArtboard id="home-table"   label="Populated · table-dense" width={W} height={H}>
                <Frame><HomePopulatedTable /></Frame>
              </DCArtboard>
              <DCArtboard id="home-cards"   label="Populated · grouped cards" width={W} height={H}>
                <Frame><HomePopulatedCards /></Frame>
              </DCArtboard>
              <DCArtboard id="home-wishlist" label="Wishlist tab"             width={W} height={H}>
                <Frame><HomeWishlist /></Frame>
              </DCArtboard>
            </DCSection>

            <DCSection id="search" title="02 · ADD SONG FLOW (SEARCH → CONFIGURE → SAVE)">
              <DCArtboard id="search-empty"   label="① Search · empty input"  width={W} height={H}>
                <Frame><SearchEmpty /></Frame>
              </DCArtboard>
              <DCArtboard id="search-results" label="② Search · results"       width={W} height={H}>
                <Frame><SearchResults /></Frame>
              </DCArtboard>
              <DCArtboard id="configure"      label="③ Configure · form"       width={W} height={H}>
                <Frame><ConfigureForm /></Frame>
              </DCArtboard>
              <DCArtboard id="saving"         label="④ Saving · in flight"     width={W} height={H}>
                <Frame><ConfigureSaving /></Frame>
              </DCArtboard>
              <DCArtboard id="success"        label="⑤ Saved · toast on home"  width={W} height={H}>
                <Frame><HomeWithSuccessToast /></Frame>
              </DCArtboard>
            </DCSection>

            <DCSection id="detail" title="03 · ENTRY DETAIL · EDIT · ERROR · DELETE">
              <DCArtboard id="entry-display" label="Display · read-only"       width={W} height={H}>
                <Frame><EntryDisplay /></Frame>
              </DCArtboard>
              <DCArtboard id="entry-edit"    label="Edit · inline form"        width={W} height={H}>
                <Frame><EntryEdit /></Frame>
              </DCArtboard>
              <DCArtboard id="error-dup"     label="Error · already in list"   width={W} height={H}>
                <Frame><ErrorDuplicate /></Frame>
              </DCArtboard>
              <DCArtboard id="confirm-del"   label="Confirm · remove dialog"   width={W} height={H}>
                <Frame><ConfirmDelete /></Frame>
              </DCArtboard>
            </DCSection>
          </DesignCanvas>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
