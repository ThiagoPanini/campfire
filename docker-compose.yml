services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: campfire
      POSTGRES_PASSWORD: campfire
      POSTGRES_DB: campfire
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campfire -d campfire"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - campfire_postgres_data:/var/lib/postgresql/data

volumes:
  campfire_postgres_data: