openapi: 3.1.0
info:
  title: Campfire Authentication and Preferences MVP API
  version: 0.3.0
  description: >
    Backend contract for Campfire-owned user context, onboarding state, and
    preferences. Credential flows are owned by Cognito and documented in
    cognito-auth.md.
servers:
  - url: https://api.example.campfire
    description: Deployed API
  - url: http://127.0.0.1:8010
    description: Local backend API
security:
  - bearerAuth: []
paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      security: []
      responses:
        "200":
          description: API is reachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /me:
    get:
      summary: Get authenticated user context
      operationId: getMe
      responses:
        "200":
          description: Authenticated user context returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserContextResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /me/preferences:
    get:
      summary: Get current user's preferences
      operationId: getMyPreferences
      responses:
        "200":
          description: Preferences exist for the authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferencesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: No preferences saved yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      summary: Create or update current user's preferences
      operationId: putMyPreferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPreferencesPayload"
      responses:
        "200":
          description: Preferences saved and onboarding marked completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferencesResponse"
        "400":
          description: Request body or preference value is invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /me/onboarding:
    patch:
      summary: Update onboarding state for the current user
      operationId: patchMyOnboarding
      description: >
        The MVP only allows explicit deferral through this endpoint. Saving
        preferences through PUT /me/preferences marks onboarding completed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum:
                    - deferred
      responses:
        "200":
          description: Onboarding state updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingState"
        "400":
          description: Unsupported onboarding transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    Unauthorized:
      description: Missing, expired, unverified, or invalid authentication
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - service
        - timestamp
      properties:
        status:
          type: string
          const: ok
        service:
          type: string
        timestamp:
          type: string
          format: date-time
    UserContextResponse:
      type: object
      required:
        - user
        - auth
        - onboarding
        - bootstrap
      properties:
        user:
          $ref: "#/components/schemas/UserSummary"
        auth:
          $ref: "#/components/schemas/AuthSummary"
        onboarding:
          $ref: "#/components/schemas/OnboardingState"
        bootstrap:
          type: object
          required:
            - firstLogin
          properties:
            firstLogin:
              type: boolean
    UserSummary:
      type: object
      required:
        - id
        - email
        - displayName
        - status
        - lastLoginAt
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        displayName:
          type: string
        status:
          type: string
          enum:
            - active
        lastLoginAt:
          type: string
          format: date-time
    AuthSummary:
      type: object
      required:
        - emailVerified
      properties:
        emailVerified:
          type: boolean
        methods:
          type: array
          items:
            type: string
            enum:
              - email_password
              - google
    OnboardingState:
      type: object
      required:
        - status
        - hasPreferences
        - updatedAt
      properties:
        status:
          type: string
          enum:
            - required
            - completed
            - deferred
        hasPreferences:
          type: boolean
        completedAt:
          type:
            - string
            - "null"
          format: date-time
        deferredAt:
          type:
            - string
            - "null"
          format: date-time
        updatedAt:
          type: string
          format: date-time
    UserPreferencesPayload:
      type: object
      required:
        - instruments
        - genres
        - playContext
        - goals
        - experienceLevel
      properties:
        instruments:
          type: array
          uniqueItems: true
          items:
            type: string
        genres:
          type: array
          uniqueItems: true
          items:
            type: string
        playContext:
          type:
            - string
            - "null"
          enum:
            - friends
            - amateur
            - pro
            - solo
            - church
            - sessions
            - null
        goals:
          type: array
          uniqueItems: true
          items:
            type: string
        experienceLevel:
          type:
            - string
            - "null"
          enum:
            - beginner
            - learning
            - intermediate
            - advanced
            - null
    UserPreferencesResponse:
      allOf:
        - $ref: "#/components/schemas/UserPreferencesPayload"
        - type: object
          required:
            - userId
            - updatedAt
          properties:
            userId:
              type: string
            updatedAt:
              type: string
              format: date-time
    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string
