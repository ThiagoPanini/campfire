openapi: 3.1.0
info:
  title: Campfire Auth Bootstrap API
  version: 0.1.0
  description: Contract for the first authenticated Campfire backend slice.
servers:
  - url: https://api.example.campfire
paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: API is reachable
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - service
                properties:
                  status:
                    type: string
                    const: ok
                  service:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
  /me:
    get:
      summary: Get authenticated user bootstrap context
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Authenticated user context returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BootstrapIdentityResponse"
        "401":
          description: Missing or invalid authentication
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    BootstrapIdentityResponse:
      type: object
      required:
        - user
        - bootstrap
      properties:
        user:
          type: object
          required:
            - id
            - status
          properties:
            id:
              type: string
            email:
              type: string
              format: email
            displayName:
              type: string
            status:
              type: string
              enum: [active]
            lastLoginAt:
              type: string
              format: date-time
        bootstrap:
          type: object
          required:
            - firstLogin
          properties:
            firstLogin:
              type: boolean
    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string
