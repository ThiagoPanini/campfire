name: Deploy Production

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  branch-guard:
    name: Production branch guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      deploy_sha: ${{ steps.guard.outputs.deploy_sha }}
    steps:
      - name: Guard main ref and CI result
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion || '' }}
          WORKFLOW_BRANCH: ${{ github.event.workflow_run.head_branch || '' }}
          WORKFLOW_SHA: ${{ github.event.workflow_run.head_sha || '' }}
          GITHUB_REF_NAME_VALUE: ${{ github.ref_name }}
        run: |
          echo "::group::production guard"
          if [[ "$EVENT_NAME" == "workflow_run" ]]; then
            if [[ "$WORKFLOW_CONCLUSION" != "success" ]]; then
              echo "::error::Production deploy requires successful CI"
              exit 1
            fi
            if [[ "$WORKFLOW_BRANCH" != "main" ]]; then
              echo "::error::Production deploy requires main branch"
              exit 1
            fi
            current_sha="$(
              curl --silent --fail \
                --header "Authorization: Bearer ${GH_TOKEN}" \
                --header "Accept: application/vnd.github+json" \
                "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/git/ref/heads/main" |
              node -e 'let s = ""; process.stdin.on("data", d => s += d); process.stdin.on("end", () => { const ref = JSON.parse(s); console.log(ref.object.sha); });'
            )"
            if [[ "$current_sha" != "$WORKFLOW_SHA" ]]; then
              echo "::error::Successful CI SHA is not the current main tip"
              exit 1
            fi
            echo "deploy_sha=$WORKFLOW_SHA" >> "$GITHUB_OUTPUT"
          else
            if [[ "$GITHUB_REF_NAME_VALUE" != "main" ]]; then
              echo "::error::Deploys to production are only allowed from main"
              exit 1
            fi
            echo "deploy_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi
          echo "::endgroup::"

  preflight:
    name: Production preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: branch-guard
    environment: production
    steps:
      - name: Checkout preflight script
        uses: actions/checkout@v4
        with:
          ref: ${{ needs['branch-guard'].outputs.deploy_sha }}

      - name: Verify production values
        env:
          RENDER_PROD_API_DEPLOY_HOOK: ${{ secrets.RENDER_PROD_API_DEPLOY_HOOK }}
          RENDER_PROD_WEB_DEPLOY_HOOK: ${{ secrets.RENDER_PROD_WEB_DEPLOY_HOOK }}
          PROD_API_URL: ${{ vars.PROD_API_URL }}
          PROD_WEB_URL: ${{ vars.PROD_WEB_URL }}
          PREFLIGHT_ENVIRONMENT: production
          PREFLIGHT_DOCS_LINK: docs/backend/ops/cicd.mdx#provisioning-production
        run: |
          scripts/ci/preflight-secrets.sh \
            RENDER_PROD_API_DEPLOY_HOOK \
            RENDER_PROD_WEB_DEPLOY_HOOK \
            PROD_API_URL \
            PROD_WEB_URL

  deploy-api:
    name: Deploy production API
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - branch-guard
      - preflight
    environment: production
    steps:
      - name: Checkout deploy script
        uses: actions/checkout@v4
        with:
          ref: ${{ needs['branch-guard'].outputs.deploy_sha }}

      - name: Trigger Render API deploy
        env:
          HOOK_URL: ${{ secrets.RENDER_PROD_API_DEPLOY_HOOK }}
        run: scripts/ci/render-deploy.sh production api

  deploy-web:
    name: Deploy production Web
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - branch-guard
      - deploy-api
    environment: production
    steps:
      - name: Checkout deploy script
        uses: actions/checkout@v4
        with:
          ref: ${{ needs['branch-guard'].outputs.deploy_sha }}

      - name: Trigger Render Web deploy
        env:
          HOOK_URL: ${{ secrets.RENDER_PROD_WEB_DEPLOY_HOOK }}
        run: scripts/ci/render-deploy.sh production web

  probe:
    name: Probe production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - branch-guard
      - deploy-web
    environment: production
    steps:
      - name: Checkout probe script
        uses: actions/checkout@v4
        with:
          ref: ${{ needs['branch-guard'].outputs.deploy_sha }}

      - name: Probe production URLs
        env:
          PROD_API_URL: ${{ vars.PROD_API_URL }}
          PROD_WEB_URL: ${{ vars.PROD_WEB_URL }}
        run: |
          api="${PROD_API_URL%/}"
          web="${PROD_WEB_URL%/}"
          scripts/ci/probe-url.sh "${api}/healthz" "production api /healthz"
          scripts/ci/probe-url.sh "${api}/readyz" "production api /readyz"
          scripts/ci/probe-url.sh "${web}/" "production web"

  summary:
    name: Production deployment summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - branch-guard
      - preflight
      - deploy-api
      - deploy-web
      - probe
    if: always()
    steps:
      - name: Summarize production deployment
        run: |
          {
            echo "## Production Deployment"
            echo ""
            echo "- Commit: \`${{ needs['branch-guard'].outputs.deploy_sha || github.sha }}\`"
            echo "- Branch guard: \`${{ needs['branch-guard'].result }}\`"
            echo "- Preflight: \`${{ needs.preflight.result }}\`"
            echo "- API deploy: \`${{ needs['deploy-api'].result }}\`"
            echo "- Web deploy: \`${{ needs['deploy-web'].result }}\`"
            echo "- Probes: \`${{ needs.probe.result }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "${{ needs['branch-guard'].result }}" != "success" || "${{ needs.preflight.result }}" != "success" || "${{ needs['deploy-api'].result }}" != "success" || "${{ needs['deploy-web'].result }}" != "success" || "${{ needs.probe.result }}" != "success" ]]; then
            exit 1
          fi
